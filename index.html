<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexcart</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#2575fc,#6a11cb);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:40px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
width:90%;
max-width:400px;
}

h1{
color:#2575fc;
margin-bottom:10px;
}

p{
color:#555;
margin-bottom:30px;
}

.btn{
display:block;
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
text-decoration:none;
color:white;
}

.signup{
background:#2575fc;
}

.login{
background:#6a11cb;
}

footer{
margin-top:20px;
font-size:13px;
color:gray;
}
</style>
</head>

<body>

<div class="container">

<h1>Nexcart</h1>

<p>Redefining Online Commerce</p>

<a href="signup.html" class="btn signup">Create Account</a>

<a href="login.html" class="btn login">Login</a>

<footer>
© 2026 Nexcart. All Rights Reserved.
</footer>

</div>

</body>
</html>
