<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ninad's Website</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#6a11cb,#2575fc,#00c9ff,#92fe9d);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
width:90%;
max-width:500px;
box-shadow:0 0 30px rgba(0,0,0,.3);
animation:pop 1s;
}

@keyframes pop{
from{
transform:scale(.5);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

h1{
color:#2575fc;
margin-bottom:15px;
animation:float 2s infinite alternate;
}

@keyframes float{
from{transform:translateY(0);}
to{transform:translateY(-10px);}
}

p{
font-size:18px;
margin:12px 0;
color:#333;
}

button{
margin-top:20px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:30px;
background:#2575fc;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px #2575fc;
}

footer{
margin-top:20px;
font-size:14px;
color:gray;
}
</style>

</head>

<body>
<img src="logo.png" alt="Nexcart Logo" width="180">
<div class="card">
<h1>👋 Welcome!</h1>

<p><strong>Hi, my name is Ninad.</strong></p>

<p>I am the host of this website.</p>

<p>If you want your own website, feel free to contact me.</p>

<p><b>📧 Email:</b><br>
ninadshetty4025@gmail.com</p>

<button onclick="alert('Thanks for visiting my website! 😊')">
Click Me
</button>

<footer>
Made with ❤️ by Ninad
</footer>

</div>

</body>
</html>
