<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexcart Private Limited</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#6a11cb,#2575fc,#00c9ff,#92fe9d);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
width:90%;
max-width:500px;
box-shadow:0 0 30px rgba(0,0,0,.3);
animation:pop 1s;
}

@keyframes pop{
from{
transform:scale(.5);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.logo{
width:180px;
margin-bottom:20px;
}

h1{
color:#2575fc;
margin-bottom:15px;
}

p{
font-size:18px;
margin:12px 0;
color:#333;
}

button{
margin-top:20px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:30px;
background:#2575fc;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

footer{
margin-top:20px;
font-size:14px;
color:gray;
}
</style>

</head>

<body>

<div class="card">

<img src="logo.png" alt="Nexcart Logo" class="logo">

<h1>Welcome to Nexcart Private Limited</h1>

<p><strong>Redefining Online Commerce</strong></p>

<p>We provide reliable dropshipping solutions for businesses and entrepreneurs.</p>

<p>Click the button below to learn more about our services.</p>

<button onclick="window.location.href='home.html'">
Click Here
</button>

<footer>
© 2026 Nexcart Private Limited
</footer>

</div>

</body>
</html>
