<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexcart</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

header{
background:#2575fc;
color:white;
padding:20px;
text-align:center;
}

header img{
width:90px;
height:90px;
border-radius:15px;
}

header h1{
margin:10px 0 5px;
}

header p{
margin:0;
font-size:18px;
}

.container{
padding:30px;
text-align:center;
}

.product{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.15);
display:inline-block;
max-width:320px;
}

.product img{
width:200px;
}

button{
background:#2575fc;
color:white;
border:none;
padding:12px 25px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
font-size:16px;
}

button:hover{
background:#1b5fd6;
}
</style>
</head>

<body>

<header>
<img src="logo.png" alt="Nexcart Logo">
<h1>Nexcart</h1>
<p><b>Redefining Online Commerce</b></p>
</header>

<div class="container">

<div class="product">
<h2>Your Product Here</h2>
<p>Add your MacBook or any product here.</p>
<button>Buy Now</button>
</div>

</div>

</body>
</html>
